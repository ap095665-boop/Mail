<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Detective Communication</title>

<style>

*{
box-sizing:border-box;
}

html,body{
margin:0;
height:100%;
font-family:system-ui;
background:#0b0f18;
color:white;
}

/* APP CONTAINER */

.app{
height:100vh;
width:100vw;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
padding:14px;
background:#111827;
text-align:center;
font-weight:600;
letter-spacing:1px;
}

/* HOME */

.home{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:20px;
}

button{
padding:14px 20px;
font-size:16px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
}

/* INCOMING MESSAGE SCREEN */

.incoming{
position:fixed;
top:0;
left:0;
height:100%;
width:100%;
background:#0b0f18;
display:none;
flex-direction:column;
}

/* MESSAGE AREA */

.messageArea{
flex:1;
padding:20px;
}

.sender{
font-size:18px;
font-weight:600;
}

.role{
font-size:12px;
color:#9ca3af;
margin-bottom:15px;
}

.text{
font-size:16px;
line-height:1.5;
}

/* REPLY BAR */

.reply{
padding:10px;
background:#111827;
display:flex;
gap:10px;
}

.reply input{
flex:1;
padding:12px;
border:none;
border-radius:6px;
}

.reply button{
padding:12px 16px;
}

/* SEND MESSAGE SCREEN */

.compose{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0b0f18;
display:none;
flex-direction:column;
padding:20px;
gap:10px;
}

.compose input, textarea{
width:100%;
padding:12px;
border:none;
border-radius:6px;
}

textarea{
height:120px;
}

</style>

</head>

<body>

<div class="app">

<div class="header">
Central Detective Network
</div>

<div class="home">

<button onclick="openCompose()">Create Incoming Message</button>

</div>

</div>


<!-- INCOMING MESSAGE SCREEN -->

<div class="incoming" id="incoming">

<div class="messageArea">

<div class="sender" id="sender"></div>
<div class="role" id="role"></div>

<div class="text" id="msg"></div>

</div>

<div class="reply">

<input placeholder="Reply message">

<button onclick="closeIncoming()">Send</button>

</div>

</div>



<!-- COMPOSE SCREEN -->

<div class="compose" id="compose">

<h3>Create Message</h3>

<input id="name" placeholder="Sender name">

<input id="designation" placeholder="Designation">

<textarea id="message" placeholder="Message"></textarea>

<button onclick="sendMessage()">Send</button>

<button onclick="closeCompose()">Cancel</button>

</div>



<script>

function openCompose(){
document.getElementById("compose").style.display="flex"
}

function closeCompose(){
document.getElementById("compose").style.display="none"
}

function sendMessage(){

let name=document.getElementById("name").value
let role=document.getElementById("designation").value
let message=document.getElementById("message").value

document.getElementById("sender").innerText=name
document.getElementById("role").innerText=role
document.getElementById("msg").innerText=message

closeCompose()

document.getElementById("incoming").style.display="flex"

}

function closeIncoming(){
document.getElementById("incoming").style.display="none"
}

</script>

</body>
</html>
