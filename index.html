<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Central Detective Council</title>

<style>

body{
margin:0;
background:#0a0f1a;
font-family:Arial;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

.header{
background:#121a2b;
padding:15px;
font-size:20px;
text-align:center;
letter-spacing:2px;
}

.main{
display:flex;
flex:1;
}

.control{
width:320px;
background:#0f1626;
padding:15px;
border-right:1px solid #333;
}

.control input, textarea{
width:100%;
margin-bottom:10px;
padding:8px;
background:#1b2338;
border:none;
color:white;
}

.control button{
width:100%;
padding:10px;
background:#2563eb;
border:none;
color:white;
cursor:pointer;
margin-bottom:8px;
}

.screen{
flex:1;
position:relative;
padding:20px;
}

.chat{
height:100%;
overflow:auto;
}

.message{
margin:10px 0;
padding:10px;
border-radius:6px;
max-width:60%;
}

.sent{
background:#2563eb;
margin-left:auto;
}

.received{
background:#374151;
}

.sender{
font-size:12px;
color:#9ca3af;
margin-bottom:4px;
}

.popup{
position:absolute;
top:20px;
right:20px;
background:#111827;
padding:20px;
border-radius:10px;
display:none;
box-shadow:0 0 15px black;
width:260px;
}

.popup h4{
margin-top:0;
}

</style>

</head>

<body>

<div class="header">
CENTRAL DETECTIVE COUNCIL COMMUNICATION SYSTEM
</div>

<div class="main">

<div class="control">

<h3>Incoming Message</h3>

<input id="name" placeholder="Officer Name">
<input id="rank" placeholder="Designation">

<textarea id="incomingText" placeholder="Incoming message"></textarea>

<button onclick="triggerIncoming()">Trigger Incoming Mail</button>

<hr>

<h3>Send Message</h3>

<textarea id="sendText" placeholder="Your message"></textarea>

<button onclick="sendMessage()">Send Message</button>

</div>

<div class="screen">

<div class="chat" id="chat"></div>

<div class="popup" id="popup">

<h4>📨 Incoming Transmission</h4>

<div id="popupSender"></div>

<p id="popupMessage"></p>

<button onclick="acceptMessage()">Open</button>

</div>

</div>

</div>

<script>

const chat = document.getElementById("chat")

function triggerIncoming(){

let name=document.getElementById("name").value
let rank=document.getElementById("rank").value
let text=document.getElementById("incomingText").value

document.getElementById("popupSender").innerText=name+" - "+rank
document.getElementById("popupMessage").innerText=text

document.getElementById("popup").style.display="block"

}

function acceptMessage(){

let name=document.getElementById("name").value
let rank=document.getElementById("rank").value
let text=document.getElementById("incomingText").value

let msg=document.createElement("div")
msg.className="message received"

msg.innerHTML="<div class='sender'>"+name+" ("+rank+")</div>"+text

chat.appendChild(msg)

document.getElementById("popup").style.display="none"

chat.scrollTop=chat.scrollHeight

}

function sendMessage(){

let text=document.getElementById("sendText").value

let msg=document.createElement("div")
msg.className="message sent"
msg.innerText=text

chat.appendChild(msg)

document.getElementById("sendText").value=""

chat.scrollTop=chat.scrollHeight

}

</script>

</body>
</html>
