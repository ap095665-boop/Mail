<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:#050b18;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:#00eaff;
}

/* phone screen */

#screen{
width:340px;
height:640px;
border-radius:30px;
background:#020611;
border:2px solid #00eaff33;
overflow:hidden;
position:relative;
box-shadow:0 0 40px #00eaff33 inset;
}

/* notification screen */

#notification{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

.notifyBox{
border:1px solid #00eaff55;
padding:20px;
border-radius:10px;
background:#03102a;
box-shadow:0 0 20px #00eaff33;
cursor:pointer;
}

.notifyBox:hover{
background:#04153a;
}

/* message interface */

#chat{
display:none;
position:absolute;
width:100%;
height:100%;
padding:20px;
box-sizing:border-box;
}

.message{
background:#021b2e;
padding:15px;
border-radius:8px;
border:1px solid #00eaff55;
margin-bottom:20px;
}

.replyBtn{
border:none;
background:#00eaff;
color:#000;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

/* send animation */

#sending{
display:none;
position:absolute;
width:100%;
height:100%;
justify-content:center;
align-items:center;
flex-direction:column;
background:#01040b;
}

.circle{
width:80px;
height:80px;
border-radius:50%;
border:3px solid #00eaff;
border-top:3px solid transparent;
animation:spin 1s linear infinite;
margin-bottom:20px;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

.sent{
font-size:20px;
animation:glow 1s infinite alternate;
}

@keyframes glow{
from{opacity:0.5}
to{opacity:1}
}

</style>
</head>

<body>

<div id="screen">

<!-- notification -->

<div id="notification">

<div class="notifyBox" onclick="openMessage()">

INCOMING MESSAGE<br><br>

Central Detective Council<br><br>

Tap to Open

</div>

</div>

<!-- chat screen -->

<div id="chat">

<div class="message">

Paul's Detective Agency,

Your agency has been selected
for the missing developer investigation.

Reply immediately to confirm.

</div>

<button class="replyBtn" onclick="sendReply()">

Send Confirmation

</button>

</div>

<!-- sending screen -->

<div id="sending">

<div class="circle"></div>

<div class="sent">

Message Sent

</div>

</div>

</div>

<script>

function openMessage(){

document.getElementById("notification").style.display="none"
document.getElementById("chat").style.display="block"

}

function sendReply(){

document.getElementById("chat").style.display="none"
document.getElementById("sending").style.display="flex"

}

</script>

</body>
</html>
