<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#050a14;
font-family:Arial;
color:#00eaff;
}

/* phone frame */

.phone{
width:340px;
height:600px;
border-radius:30px;
background:#0b1424;
box-shadow:0 0 30px rgba(0,255,255,0.2);
overflow:hidden;
position:relative;
}

/* header */

.header{
padding:15px;
text-align:center;
font-weight:bold;
border-bottom:1px solid rgba(0,255,255,.3);
}

/* message notification */

.messageCard{
margin:20px;
padding:15px;
border-radius:12px;
background:rgba(0,255,255,0.05);
border:1px solid rgba(0,255,255,.4);
cursor:pointer;
transition:.3s;
}

.messageCard:hover{
background:rgba(0,255,255,0.15);
}

/* chat screen */

.chatScreen{
display:none;
flex-direction:column;
height:100%;
}

/* message bubble */

.msg{
margin:15px;
padding:12px;
border-radius:10px;
background:rgba(0,255,255,.15);
}

/* typing area */

.inputArea{
position:absolute;
bottom:0;
width:100%;
display:flex;
background:#09101c;
border-top:1px solid rgba(0,255,255,.3);
}

input{
flex:1;
padding:15px;
background:transparent;
border:none;
color:#00eaff;
outline:none;
}

/* send button */

button{
padding:15px 20px;
background:#00eaff;
border:none;
color:black;
cursor:pointer;
}

/* sent message */

.sent{
align-self:flex-end;
background:#00eaff;
color:black;
margin:15px;
padding:12px;
border-radius:10px;
animation:sendAnim .4s ease;
}

/* tick mark */

.tick{
font-size:12px;
margin-left:6px;
}

/* send animation */

@keyframes sendAnim{
0%{transform:translateX(40px);opacity:0}
100%{transform:translateX(0);opacity:1}
}

</style>
</head>

<body>

<div class="phone">

<div class="header">Central Detective Council</div>

<!-- Inbox -->

<div id="inbox">

<div class="messageCard" onclick="openMessage()">

<strong>Rosalio, Superior-CDC</strong>

<p style="margin-top:8px;color:#8defff;">
Case assigned. Immediate response required.
</p>

</div>

</div>

<!-- Chat Screen -->

<div id="chat" class="chatScreen">

<div class="msg">
Central Detective Council:
<br><br>
Your agency has been selected for the investigation.
</div>

<div id="chatArea"></div>

<div class="inputArea">
<input id="replyInput" placeholder="Type reply...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

</div>

<script>

function openMessage(){

document.getElementById("inbox").style.display="none"
document.getElementById("chat").style.display="flex"

}

function sendMessage(){

let input=document.getElementById("replyInput")
let text=input.value.trim()

if(text==="") return

let bubble=document.createElement("div")
bubble.className="sent"
bubble.innerHTML=text+' <span class="tick">✓</span>'

document.getElementById("chatArea").appendChild(bubble)

input.value=""

}

</script>

</body>
</html>
