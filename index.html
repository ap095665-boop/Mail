<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Detective Communication</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0c111b;
color:white;
height:100vh;
overflow:hidden;
}

/* TOP BAR */

.topbar{
background:#111827;
padding:15px;
text-align:center;
font-weight:bold;
letter-spacing:1px;
}

/* MAIN SCREEN */

.screen{
height:100%;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
gap:20px;
}

button{
padding:12px 20px;
background:#2563eb;
border:none;
color:white;
border-radius:8px;
font-size:16px;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000e0;
display:none;
flex-direction:column;
justify-content:center;
padding:20px;
}

/* MESSAGE CARD */

.card{
background:#111827;
padding:20px;
border-radius:10px;
}

.sender{
font-weight:bold;
margin-bottom:5px;
}

.designation{
font-size:12px;
color:#9ca3af;
margin-bottom:15px;
}

.message{
line-height:1.4;
}

/* REPLY BAR */

.replybar{
position:absolute;
bottom:0;
left:0;
width:100%;
background:#111827;
padding:10px;
display:flex;
gap:10px;
}

.replybar input{
flex:1;
padding:10px;
border:none;
border-radius:6px;
}

/* SEND POPUP */

.form input,textarea{
width:100%;
margin-bottom:10px;
padding:10px;
border:none;
border-radius:6px;
}

</style>

</head>

<body>

<div class="topbar">
Central Detective Communication
</div>

<div class="screen">

<button onclick="openIncoming()">Simulate Incoming Message</button>

<button onclick="openSend()">Send Message</button>

</div>


<!-- INCOMING MESSAGE SCREEN -->

<div class="popup" id="incomingPopup">

<div class="card">

<div class="sender" id="senderName"></div>
<div class="designation" id="senderRole"></div>

<div class="message" id="messageText"></div>

</div>

<div class="replybar">

<input placeholder="Type reply...">

<button onclick="closeIncoming()">Send</button>

</div>

</div>



<!-- SEND MESSAGE SCREEN -->

<div class="popup" id="sendPopup">

<div class="card form">

<h3>Create Message</h3>

<input id="nameInput" placeholder="Sender Name">

<input id="roleInput" placeholder="Designation">

<textarea id="msgInput" placeholder="Message"></textarea>

<button onclick="sendMessage()">Send Message</button>

<button onclick="closeSend()">Cancel</button>

</div>

</div>



<script>

function openIncoming(){
document.getElementById("incomingPopup").style.display="flex"
}

function closeIncoming(){
document.getElementById("incomingPopup").style.display="none"
}

function openSend(){
document.getElementById("sendPopup").style.display="flex"
}

function closeSend(){
document.getElementById("sendPopup").style.display="none"
}

function sendMessage(){

let name=document.getElementById("nameInput").value
let role=document.getElementById("roleInput").value
let msg=document.getElementById("msgInput").value

document.getElementById("senderName").innerText=name
document.getElementById("senderRole").innerText=role
document.getElementById("messageText").innerText=msg

closeSend()

document.getElementById("incomingPopup").style.display="flex"

}

</script>

</body>
</html>
